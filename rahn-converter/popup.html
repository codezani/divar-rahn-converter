<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Tahoma, sans-serif; width: 340px; padding: 20px; background: #f8fafc; }
    h2 { text-align: center; color: #166534; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: 2px solid #4ade80; border-radius: 10px; }
    button { width: 100%; padding: 14px; background: #4ade80; color: #166534; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { background: #22c55e; }
    .result { margin-top: 15px; padding: 15px; background: #dcfce7; border-radius: 12px; border: 3px solid #4ade80; font-size: 17.5px; line-height: 1.8; display: none; }
  </style>
</head>
<body>
  <h2>🧮 محاسبه‌گر رهن کامل</h2>
  
  <input type="text" id="rahn" placeholder="ودیعه / رهن (تومان)">
  <input type="text" id="rent" placeholder="اجاره ماهانه (تومان)">
  <input type="text" id="area" placeholder="متراژ (اختیاری)">

  <button onclick="calculate()">محاسبه رهن کامل</button>

  <div id="result" class="result"></div>

  <script src="popup.js"></script>
</body>
</html>
